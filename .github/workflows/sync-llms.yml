name: Auto-Sync llms.txt
on:
  push:
    paths:
      - 'README.md'
      - '.github/llms-header.txt' # Added to trigger sync if context changes

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile llms.txt with AI Context Header
        run: cat .github/llms-header.txt README.md > llms.txt

      - name: Commit and Push llms.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add llms.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated sync of llms.txt with AI context" && git push)
